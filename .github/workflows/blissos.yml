
name: BlissOS

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/blissos.yml'
      - '.github/workflows/testrun.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Coverage tracks blissos-builder v2.0.2 (ALL_RELEASES = 14, 15, 16), x86_64.
# scp is the only sync backend the Android guest supports (a static scp from
# the dropbear tree is baked into /system/bin, builder release >= v2.0.1; no
# rsync/sshfs/nfs on Android). vmpath goes under /data, the writable
# partition (the default /mnt/host is a vold-managed tmpfs on Android).
#
# The Linux runner uses KVM; the macOS (arm64) and Windows runners run the
# x86_64 guest under TCG with software GLES rendering, which boots slowly, so a
# pause is inserted between the ssh probes (mirrors testmacos.yml).
jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=blissos]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["14", "15", "16"]
        arch: [""]
        runs: ["ubuntu-24.04", "windows-latest", "macos-latest"]
        sync: ["scp"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: blissos
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}
      vmpath: "/data/hostshare"
      sleep: ${{ matrix.runs != 'ubuntu-24.04' && 'sleep 10;' || '' }}
