
name: Windows

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/testwindows.yml'
      - '.github/workflows/testrun.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        os: ["freebsd", "ghostbsd", "midnightbsd", "netbsd", "openbsd", "solaris", "dragonflybsd", "omnios", "openindiana", "tribblix", "ubuntu", "openeuler", "hurd"]
        arch: [""]
        runs: ["windows-latest"]
        sync: ["scp", "rsync", "nfs"]
        exclude:
          - os: solaris
            arch: aarch64
          - os: dragonflybsd
            arch: aarch64
          - os: omnios
            arch: aarch64
          - os: openindiana
            arch: aarch64
          - os: tribblix
            arch: aarch64

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  # Plan 9 (9front) has no sshd, so it cannot reuse the ssh-based
  # testrun.yml. Verify boot + telnet exec on the Windows host (WHPX/TCG).
  # NOTE: 9P folder sync is NOT tested here -- it needs the Linux kernel v9fs
  # client (mount -t 9p), which does not exist on Windows, so a plan9 -v sync
  # is a Linux-host-only feature. The full boot + telnet + 9P-sync path is
  # covered on Linux by plan9.yml. Here we only prove anyvm can boot and drive
  # a plan9 guest on a Windows host.
  plan9:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=plan9]') }}
    runs-on: windows-latest
    name: Test plan9 telnet
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      shell: bash
      run: |
        for i in 1 2 3; do
          choco install -y --no-progress qemu zstandard && exit 0
          echo "Attempt $i failed, sleeping 15s..."
          sleep 15
        done
        exit 1
    - name: Boot 9front and verify telnet exec
      shell: bash
      run: |
        set -e
        mkdir -p ../test_output
        python anyvm.py --debug --data-dir ../test_output --os plan9 \
          --ssh-port 10023 -d
        echo "===============verify telnet exec"
        python - <<'PY'
        import socket, sys, time
        def telnet_exec(port, cmds, settle=4.0):
            IAC=255; SE=240; SB=250; WILL,WONT,DO,DONT=251,252,253,254
            out=bytearray()
            s=socket.create_connection(("127.0.0.1",port),15)
            def eat(data):
                i=0;n=len(data)
                while i<n:
                    b=data[i]
                    if b!=IAC: out.append(b); i+=1; continue
                    if i+1>=n: break
                    c=data[i+1]
                    if c in (DO,DONT,WILL,WONT) and i+2<n:
                        o=data[i+2]
                        if c==DO: s.sendall(bytes([IAC,WONT,o]))
                        elif c==WILL: s.sendall(bytes([IAC,DONT,o]))
                        i+=3
                    elif c==SB:
                        j=i+2
                        while j+1<n and not (data[j]==IAC and data[j+1]==SE): j+=1
                        i=j+2
                    else: i+=2
            def rd(sec):
                end=time.time()+sec; s.settimeout(0.5)
                while time.time()<end:
                    try: d=s.recv(4096)
                    except socket.timeout: continue
                    if not d: return
                    eat(d)
            rd(min(settle,2))
            for c in cmds:
                s.sendall(c.encode()+b"\r\n"); rd(settle)
            s.close(); return out.decode("utf-8","replace")
        txt=""
        for _ in range(40):
            try:
                txt=telnet_exec(10023, ["echo EXEC''-OK", "cat /dev/user"])
                if "EXEC-OK" in txt: break
            except OSError: time.sleep(5)
        print(txt)
        assert "EXEC-OK" in txt, "telnet exec failed"
        print("plan9 verify OK: telnet exec (9P sync is Linux-only, see plan9.yml)")
        PY



