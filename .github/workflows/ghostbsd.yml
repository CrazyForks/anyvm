
name: GhostBSD

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/ghostbsd.yml'
      - '.github/workflows/testrun.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=ghostbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        # GhostBSD is published as amd64 (x86_64) only. The releases map to the
        # official MATE image (26.1), the community XFCE image (26.1-xfce) and
        # the community GNUstep "Gershwin" preview (26.1-gershwin).
        release: ["26.1", "26.1-xfce", "26.1-gershwin"]
        arch: [""]
        runs: ["ubuntu-24.04"]
        # The ghostbsd-builder image pre-installs fusefs-sshfs, rsync and the
        # NFS client via VM_PRE_INSTALL_PKGS (GhostBSD-nfs, which provides
        # /sbin/mount_nfs -- GhostBSD splits it out of base, unlike stock
        # FreeBSD) and loads fusefs at boot. scp always works over plain ssh.
        sync: [ "sshfs", "scp", "rsync", "nfs" ]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: ghostbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}
