
name: NetBSD

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/netbsd.yml'
      - '.github/workflows/testrun.yml'



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Releases anyvm can fetch and run: 9.3 / 9.4 / 10.0 / 10.1 / 11.0 from the
# current anyvm-org/netbsd-builder, plus 9.0 / 9.1 / 9.2 still served by the
# vmactions fallback repo. aarch64 ships from 10.0 on; riscv64 only on 11.0;
# sparc64 on 10.0 / 10.1 / 11.0.
# Sync: x86_64 / aarch64 / riscv64 run all four backends (sshfs uses NetBSD's
# base mount_psshfs). sparc64 is scp only -- the QEMU sun4u CMD646 PCI-IDE
# loses interrupts under sustained net+disk DMA (a live sshfs/nfs mount wedges
# the guest) and 11.0 sparc64 ships no rsync.
jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=netbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["9.0", "9.1", "9.2", "9.3", "9.4", "10.0", "10.1", "11.0"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04"]
        sync: ["sshfs", "nfs", "scp", "rsync"]
        exclude:
          # aarch64 ships only from 10.0 onward.
          - release: "9.0"
            arch: aarch64
          - release: "9.1"
            arch: aarch64
          - release: "9.2"
            arch: aarch64
          - release: "9.3"
            arch: aarch64
          - release: "9.4"
            arch: aarch64

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: netbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  # riscv64 (QEMU virt + u-boot/EDK2) ships only for 11.0 -- the riscv port
  # does not exist on the netbsd-9 / netbsd-10 branches.
  testriscv64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=netbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["11.0"]
        arch: ["riscv64"]
        runs: ["ubuntu-24.04"]
        sync: ["sshfs", "nfs", "scp", "rsync"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: netbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  # sparc64 (QEMU sun4u, TCG only) ships for 10.0 / 10.1 / 11.0. scp only --
  # see the sun4u lost-interrupt / no-rsync notes in the header above.
  testsparc64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=netbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["10.0", "10.1", "11.0"]
        arch: ["sparc64"]
        runs: ["ubuntu-24.04"]
        sync: ["scp"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: netbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}
