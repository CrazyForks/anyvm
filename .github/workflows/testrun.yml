name: TestRun

on:
  workflow_call:
    inputs:
      runs:
        description: "Runs on"
        required: false
        type: string
      os:
        description: "Test os"
        required: true
        type: string
      arch:
        description: "Test arch"
        required: true
        type: string
      release:
        description: "Test release"
        required: false
        type: string
      nic:
        description: "VM nic type"
        required: false
        type: string
      sync:
        description: "Sync type"
        required: false
        type: string
      user:
        description: "VM user"
        required: false
        type: string
        default: "root"
      vmpath:
        description: "VM path for sync"
        required: false
        type: string
        default: "/mnt/host"
      sleep:
        description: "sleep for  test"
        required: false
        type: string
        default: ""



jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, format('[testos={0}]', inputs.os)) }}
    runs-on: ${{ inputs.runs }}
    name: Test ${{ inputs.release }} ${{ inputs.arch }} ${{ inputs.sync }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get --no-install-recommends -y install \
        zstd \
        ovmf \
        xz-utils \
        qemu-utils \
        ca-certificates \
        qemu-system-x86 \
        qemu-system-arm qemu-efi-aarch64 \
        qemu-system-misc u-boot-qemu ipxe-qemu \
        qemu-system-ppc \
        qemu-system-s390x \
        qemu-system-sparc \
        nfs-kernel-server rsync
        sudo chmod 666 /dev/kvm || true

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install qemu rsync

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        #C:/msys64/usr/bin/pacman.exe  -S --noconfirm  mingw-w64-ucrt-x86_64-qemu
        for i in 1 2 3; do
          choco install -y --no-progress qemu zstandard rsync && exit 0
          echo "Attempt $i failed, sleeping 15s..."
          sleep 15
        done
        exit 1

    - name: Test 
      id: test
      shell: bash
      run: |
        set -e
        mountdir=test
        mkdir -p ${mountdir}
        echo "anyvm" > ${mountdir}/justcheck.txt
        echo "anyvm" > ${mountdir}/.dotfile
        mkdir -p ../test_output
        python anyvm.py --debug --data-dir ../test_output --os "${{ inputs.os }}" --release "${{ inputs.release }}" --arch "${{ inputs.arch }}" -d -v "${mountdir}:${{ inputs.vmpath }}" --ssh-port 10022 --ssh-name "testname" -p 20022:22 --nc "${{ inputs.nc }}" --sync "${{ inputs.sync }}" --sync-time  --remote-vnc no
        # We use the ssh port as an alias to the vm, so we can use 'ssh $port' to login
        echo "===============test 1"
        ${{ inputs.sleep }}
        ssh -v 10022 "ls -lah ${{ inputs.vmpath }}; exit";
        echo "===============test 2"
        ${{ inputs.sleep }}
        ssh -v 10022 "ls ${{ inputs.vmpath }}; exit" | grep justcheck.txt;
        ${{ inputs.sleep }}
        ssh -v 10022 "ls -lah ${{ inputs.vmpath }}; exit" | grep '.dotfile';
        echo "===============test 3"
        ${{ inputs.sleep }}
        ssh -v testname "ls ${{ inputs.vmpath }}; exit" | grep justcheck.txt;
        echo "===============test 4"
        ${{ inputs.sleep }}
        ssh -v -p 20022 -o StrictHostKeyChecking=accept-new ${{ inputs.user }}@localhost "ls ${{ inputs.vmpath }}; exit" | grep justcheck.txt;

    # Coherence stress for live-mount sync modes: mimic a parallel build
    # (compiler writes .o files, linker reads them back seconds later;
    # meson rewrites build.ninja right before ninja re-reads it). Catches
    # the psshfs stale-cache corruption from vmactions/netbsd-vm#21.
    # Gated to netbsd for now; rsync/scp are copy modes with no coherence
    # question, so only sshfs/nfs are exercised.
    - name: Sync coherence stress
      if: ${{ inputs.os == 'netbsd' && (inputs.sync == 'sshfs' || inputs.sync == 'nfs') }}
      shell: bash
      run: |
        set -e
        mountdir=test
        # Deliver the guest script over ssh stdin, NOT by writing it into the
        # shared mount: files created host-side AFTER the guest mounted are
        # not guaranteed to be visible in the guest (psshfs -t -1 freezes the
        # dircache; round-2 CI failed exactly on "Can't open stress.sh").
        cat > stress.sh <<'EOF'
        #!/bin/sh
        # Runs INSIDE the guest on the shared mount ($1). POSIX sh + base
        # tools only (dd, cksum, seq are all in the NetBSD base system).
        mnt="$1"
        d="$mnt/stress.dir"
        marker="/tmp/stress.fail"
        rm -f "$marker"
        mkdir -p "$d" || exit 1
        for w in 1 2 3 4 5 6; do
          (
            for i in $(seq 1 15); do
              src="/tmp/stress.$w.$i"
              f="$d/w$w.f$i"
              # write-then-immediate-reread (compile -> link pattern)
              dd if=/dev/urandom of="$src" bs=8k count=8 2>/dev/null
              want=$(cksum < "$src")
              cp "$src" "$f"
              got=$(cksum < "$f")
              if [ "$want" != "$got" ]; then
                echo "REREAD MISMATCH $f: want [$want] got [$got]"
                touch "$marker"
              fi
              # rewrite-in-place with a different (smaller) size, reread
              # (meson rewriting build.ninja pattern)
              dd if=/dev/urandom of="$src" bs=1k count=3 2>/dev/null
              want=$(cksum < "$src")
              cp "$src" "$f"
              got=$(cksum < "$f")
              if [ "$want" != "$got" ]; then
                echo "REWRITE MISMATCH $f: want [$want] got [$got]"
                touch "$marker"
              fi
              echo "$want" > "$f.sum"
              rm -f "$src"
            done
          ) &
        done
        wait
        if [ -e "$marker" ]; then
          echo "coherence stress FAILED in guest"
          exit 1
        fi
        echo "coherence stress passed in guest"
        EOF
        echo "===============coherence stress (guest side)"
        ssh 10022 "sh -s ${{ inputs.vmpath }}" < stress.sh
        echo "===============host-to-guest visibility (informational)"
        # Non-fatal probe: tells us which sshfs implementation actually
        # mounted. fuse-sshfs sees host-side files created after the mount
        # (within its ~20s dir cache); the psshfs -t -1 fallback never does.
        echo hostvis > ${mountdir}/hostvis.txt
        cat > hostvis.sh <<'EOF'
        i=0
        while [ $i -lt 10 ]; do
          if [ -e "$1/hostvis.txt" ]; then
            echo "HOSTVIS: host-side file IS visible in guest"
            exit 0
          fi
          sleep 3
          i=$((i+1))
        done
        echo "HOSTVIS: host-side file NOT visible in guest after 30s (frozen dircache fallback?)"
        exit 0
        EOF
        ssh 10022 "sh -s ${{ inputs.vmpath }}" < hostvis.sh
        echo "===============coherence stress (host side verify)"
        # Guest wrote each file plus a .sum with the cksum of its content.
        # Verify the host sees the same bytes (catches lost/partial
        # writeback after guest close). Retry briefly: a live mount may
        # still be flushing right after the guest script returns.
        ls ${mountdir}/stress.dir/*.sum >/dev/null
        for attempt in 1 2 3 4 5; do
          bad=0
          for s in ${mountdir}/stress.dir/*.sum; do
            f="${s%.sum}"
            if [ "$(cksum < "$f")" != "$(cat "$s")" ]; then
              bad=$((bad+1))
            fi
          done
          if [ "$bad" -eq 0 ]; then
            echo "host-side verify passed"
            break
          fi
          echo "host-side verify: $bad mismatched files (attempt $attempt)"
          if [ "$attempt" -eq 5 ]; then
            echo "host-side verify FAILED"
            exit 1
          fi
          sleep 3
        done

    - name: Collect debug artifacts
      if: failure()
      shell: bash
      run: |
        mkdir -p ./debug-artifacts
        if [ -d ../test_output ]; then
          (
            cd ../test_output
            find . -type f \( -name "*.log" -o -name "*.ppm" -o -name "*.txt" -o -name "*.conf" \) | while read f; do
              target="$GITHUB_WORKSPACE/debug-artifacts/$f"
              mkdir -p "$(dirname "$target")"
              cp "$f" "$target"
            done
          )
        fi
        echo "Collected artifacts:"
        find ./debug-artifacts -type f 2>/dev/null || true

    - name: Upload debug artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: debug-${{ runner.os }}-${{ inputs.os }}-${{ inputs.release }}-${{ inputs.arch }}-${{ inputs.sync }}-${{ inputs.nic }}
        path: debug-artifacts/
        retention-days: 7
        if-no-files-found: ignore












