name: TestRun

on:
  workflow_call:
    inputs:
      runs:
        description: "Runs on"
        required: false
        type: string
      os:
        description: "Test os"
        required: true
        type: string
      arch:
        description: "Test arch"
        required: true
        type: string
      release:
        description: "Test release"
        required: false
        type: string
      nic:
        description: "VM nic type"
        required: false
        type: string
      sync:
        description: "Sync type"
        required: false
        type: string
      user:
        description: "VM user"
        required: false
        type: string
        default: "root"
      vmpath:
        description: "VM path for sync"
        required: false
        type: string
        default: "/mnt/host"
      sleep:
        description: "sleep for  test"
        required: false
        type: string
        default: ""



jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, format('[testos={0}]', inputs.os)) }}
    runs-on: ${{ inputs.runs }}
    name: Test ${{ inputs.release }} ${{ inputs.arch }} ${{ inputs.sync }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get --no-install-recommends -y install \
        zstd \
        ovmf \
        xz-utils \
        qemu-utils \
        ca-certificates \
        qemu-system-x86 \
        qemu-system-arm qemu-efi-aarch64 \
        qemu-system-misc u-boot-qemu ipxe-qemu \
        qemu-system-ppc \
        qemu-system-s390x \
        qemu-system-sparc \
        nfs-kernel-server rsync
        sudo chmod 666 /dev/kvm || true

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install qemu rsync

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        #C:/msys64/usr/bin/pacman.exe  -S --noconfirm  mingw-w64-ucrt-x86_64-qemu
        for i in 1 2 3; do
          choco install -y --no-progress qemu zstandard rsync && exit 0
          echo "Attempt $i failed, sleeping 15s..."
          sleep 15
        done
        exit 1

    - name: Test 
      id: test
      shell: bash
      run: |
        set -e
        mountdir=test
        mkdir -p ${mountdir}
        echo "anyvm" > ${mountdir}/justcheck.txt
        echo "anyvm" > ${mountdir}/.dotfile
        mkdir -p ../test_output
        python anyvm.py --debug --data-dir ../test_output --os "${{ inputs.os }}" --release "${{ inputs.release }}" --arch "${{ inputs.arch }}" -d -v "${mountdir}:${{ inputs.vmpath }}" --ssh-port 10022 --ssh-name "testname" -p 20022:22 --nc "${{ inputs.nc }}" --sync "${{ inputs.sync }}" --sync-time  --remote-vnc no
        # We use the ssh port as an alias to the vm, so we can use 'ssh $port' to login
        echo "===============test 1"
        ${{ inputs.sleep }}
        ssh -v 10022 "ls -lah ${{ inputs.vmpath }}; exit";
        echo "===============test 2"
        ${{ inputs.sleep }}
        ssh -v 10022 "ls ${{ inputs.vmpath }}; exit" | grep justcheck.txt;
        ${{ inputs.sleep }}
        ssh -v 10022 "ls -lah ${{ inputs.vmpath }}; exit" | grep '.dotfile';
        echo "===============test 3"
        ${{ inputs.sleep }}
        ssh -v testname "ls ${{ inputs.vmpath }}; exit" | grep justcheck.txt;
        echo "===============test 4"
        ${{ inputs.sleep }}
        ssh -v -p 20022 -o StrictHostKeyChecking=accept-new ${{ inputs.user }}@localhost "ls ${{ inputs.vmpath }}; exit" | grep justcheck.txt;

    - name: Collect debug artifacts
      if: failure()
      shell: bash
      run: |
        mkdir -p ./debug-artifacts
        if [ -d ../test_output ]; then
          (
            cd ../test_output
            find . -type f \( -name "*.log" -o -name "*.ppm" -o -name "*.txt" -o -name "*.conf" \) | while read f; do
              target="$GITHUB_WORKSPACE/debug-artifacts/$f"
              mkdir -p "$(dirname "$target")"
              cp "$f" "$target"
            done
          )
        fi
        echo "Collected artifacts:"
        find ./debug-artifacts -type f 2>/dev/null || true

    - name: Upload debug artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: debug-${{ runner.os }}-${{ inputs.os }}-${{ inputs.release }}-${{ inputs.arch }}-${{ inputs.sync }}-${{ inputs.nic }}
        path: debug-artifacts/
        retention-days: 7
        if-no-files-found: ignore












