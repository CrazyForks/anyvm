
name: DragonflyBSD

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/dragonflybsd.yml'
      - '.github/workflows/testrun.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sshfs:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[os=') || contains(github.event.head_commit.message, '[os=dragonflybsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["6.4.1", "6.4.2"]
        arch: [""]
        runs: ["ubuntu-24.04"]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: dragonflybsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "sshfs"




  nfs:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[os=') || contains(github.event.head_commit.message, '[os=dragonflybsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["6.4.0", "6.4.1", "6.4.2"]
        arch: [""]
        runs: ["ubuntu-24.04"]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: dragonflybsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "nfs"



   
