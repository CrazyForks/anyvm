
name: Test

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/test.yml'
      - '.github/workflows/testrun.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testsync:
    strategy:
      fail-fast: false
      matrix:
        os: ["freebsd", "ghostbsd", "midnightbsd", "netbsd", "openbsd", "ubuntu", "openeuler", "hurd"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04"]
        sync: ["sshfs", "scp", "rsync"]
        exclude:
          - os: midnightbsd
            arch: aarch64
          - os: ghostbsd
            arch: aarch64
          # hurd-builder ships x86_64 + i386 only (no aarch64 port exists).
          - os: hurd
            arch: aarch64
          # The Hurd has no FUSE and the hurd archive has no sshfs package.
          - os: hurd
            sync: sshfs

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  testnfs:
    strategy:
      fail-fast: false
      matrix:
        os: ["freebsd", "ghostbsd", "midnightbsd", "netbsd", "openbsd", "solaris", "dragonflybsd", "omnios", "openindiana", "tribblix", "ubuntu", "openeuler", "hurd"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04"]
        exclude:
          - os: solaris
            arch: aarch64
          - os: dragonflybsd
            arch: aarch64
          - os: omnios
            arch: aarch64
          - os: openindiana
            arch: aarch64
          - os: tribblix
            arch: aarch64
          - os: midnightbsd
            arch: aarch64
          - os: ghostbsd
            arch: aarch64
          - os: hurd
            arch: aarch64


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      sync: nfs


  # Kept: the host kernel NFS server path (--sync sys-nfs), which is what
  # `sync: nfs` used to exercise before nfs switched to the bundled
  # user-space nfsd. hurd: /hurd/nfs is UDP-only; anyvm force-enables the
  # kernel nfsd UDP transport (rpc.nfsd --udp, needs sudo) and exports
  # with no_root_squash for hurd. Remaining unknown exercised by this
  # leg: whether the runner's rpc.mountd still answers MOUNT v1.
  testsysnfs:
    strategy:
      fail-fast: false
      matrix:
        os: ["freebsd", "ghostbsd", "midnightbsd", "netbsd", "openbsd", "solaris", "dragonflybsd", "omnios", "openindiana", "tribblix", "ubuntu", "openeuler", "hurd"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04"]
        exclude:
          - os: solaris
            arch: aarch64
          - os: dragonflybsd
            arch: aarch64
          - os: omnios
            arch: aarch64
          - os: openindiana
            arch: aarch64
          - os: tribblix
            arch: aarch64
          - os: midnightbsd
            arch: aarch64
          - os: ghostbsd
            arch: aarch64
          - os: hurd
            arch: aarch64


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      sync: sys-nfs


  # Plan 9 (9front) has no sshd, so it cannot reuse the ssh-based
  # testrun.yml. Same standalone telnet-exec + 9P-sync verification as
  # plan9.yml, on the Linux host.
  plan9:
    runs-on: ubuntu-24.04
    name: Test plan9 9p
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get --no-install-recommends -y install \
          zstd qemu-utils qemu-system-x86 ca-certificates
    - name: Boot 9front and verify telnet exec + 9P sync
      shell: bash
      run: |
        set -e
        mountdir=test
        mkdir -p ${mountdir}
        echo "anyvm" > ${mountdir}/justcheck.txt
        mkdir -p ../test_output
        python anyvm.py --debug --data-dir ../test_output --os plan9 \
          --ssh-port 10023 -d \
          --sync 9p -v "${mountdir}:/usr/glenda/work"
        echo "===============verify telnet exec + 9P-synced marker"
        python3 - <<'PY'
        import socket, sys, time
        def telnet_exec(port, cmds, settle=4.0):
            IAC=255; SE=240; SB=250; WILL,WONT,DO,DONT=251,252,253,254
            out=bytearray()
            s=socket.create_connection(("127.0.0.1",port),15)
            def eat(data):
                i=0;n=len(data)
                while i<n:
                    b=data[i]
                    if b!=IAC: out.append(b); i+=1; continue
                    if i+1>=n: break
                    c=data[i+1]
                    if c in (DO,DONT,WILL,WONT) and i+2<n:
                        o=data[i+2]
                        if c==DO: s.sendall(bytes([IAC,WONT,o]))
                        elif c==WILL: s.sendall(bytes([IAC,DONT,o]))
                        i+=3
                    elif c==SB:
                        j=i+2
                        while j+1<n and not (data[j]==IAC and data[j+1]==SE): j+=1
                        i=j+2
                    else: i+=2
            def rd(sec):
                end=time.time()+sec; s.settimeout(0.5)
                while time.time()<end:
                    try: d=s.recv(4096)
                    except socket.timeout: continue
                    if not d: return
                    eat(d)
            rd(min(settle,2))
            for c in cmds:
                s.sendall(c.encode()+b"\r\n"); rd(settle)
            s.close(); return out.decode("utf-8","replace")
        txt=""
        for _ in range(20):
            try:
                txt=telnet_exec(10023, ["echo EXEC''-OK", "ls /usr/glenda/work"])
                if "EXEC-OK" in txt: break
            except OSError: time.sleep(3)
        print(txt)
        assert "EXEC-OK" in txt, "telnet exec failed"
        assert "justcheck.txt" in txt, "9P-synced file not visible in guest"
        print("plan9 verify OK: telnet exec + 9P sync")
        PY








      
      
      
