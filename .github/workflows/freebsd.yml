
name: FreeBSD

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/freebsd.yml'
      - '.github/workflows/testrun.yml'



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All FreeBSD releases now ship from anyvm-org/freebsd-builder (>= v2.2.3, the
# DEFAULT_BUILDER_VERSIONS["freebsd"] pin in anyvm.py), which publishes the full
# 12.4 -> 15.1 matrix on x86_64 / aarch64 / riscv64 / powerpc64. The old
# "current vs vmactions-legacy-fallback" split is gone -- anyvm fetches every
# release from anyvm-org for builder >= 2.0.0. Sync support per the builder's
# verified table.md:
#   x86_64 / aarch64 (13.2+) -> rsync + scp + sshfs + nfs (image ships rsync +
#                               fusefs-sshfs); all four backends.
#   12.4 (x86_64 + aarch64)  -> nfs + scp only. 12.4 is EOL: the FreeBSD:12 pkg
#                               repo is gone, so the image is base-only (no
#                               rsync / fusefs-sshfs to install).
#   riscv64                  -> nfs + scp (base only; no FreeBSD riscv64 pkg
#                               repo). No 12.4 (riscv64 began at 13.0); no 13.4
#                               (upstream qcow2 is a broken stub).
#   powerpc64                -> nfs + scp (base only; no powerpc64 pkg repo). No
#                               12.4 (12.x panics under QEMU pseries -- needs
#                               16M large pages the host can't back).
jobs:
  # x86_64 + aarch64. Every release now has both arches. aarch64 runs on the
  # x86 runner (TCG) and the native arm runner; amd64 on the x86 runner only.
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=freebsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["12.4", "13.2", "13.3", "13.4", "13.5", "14.0", "14.1", "14.2", "14.3", "14.4", "15.0", "15.1"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04", "ubuntu-24.04-arm"]
        sync: ["sshfs", "nfs", "scp", "rsync"]
        exclude:
          - runs: ubuntu-24.04-arm
            arch: ""
          # 12.4 is base-only (EOL FreeBSD:12 pkg repo): no rsync, no sshfs.
          - release: "12.4"
            sync: rsync
          - release: "12.4"
            sync: sshfs


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: freebsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  # riscv64: nfs + scp (base only). No 12.4 image (riscv64 began at 13.0); no
  # 13.4 image (upstream qcow2 is a broken stub). nfs needs the Linux-host NFS
  # server that testrun.yml sets up, so these stay on the Linux runner.
  testriscv64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=freebsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["13.2", "13.3", "13.5", "14.0", "14.1", "14.2", "14.3", "14.4", "15.0", "15.1"]
        arch: ["riscv64"]
        runs: ["ubuntu-24.04"]
        sync: ["nfs", "scp"]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: freebsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  # powerpc64: nfs + scp (base only). No 12.4 image (12.x panics under QEMU
  # pseries). nfs needs the Linux-host NFS server, so these stay on the Linux
  # runner.
  testpowerpc64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=freebsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["13.2", "13.3", "13.4", "13.5", "14.0", "14.1", "14.2", "14.3", "14.4", "15.0", "15.1"]
        arch: ["powerpc64"]
        runs: ["ubuntu-24.04"]
        sync: ["nfs", "scp"]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: freebsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}


  # powerpc64 is a fully-emulated (TCG) guest, so it doubles as a host-
  # portability smoke test on the non-Linux runners. nfs needs a Linux host
  # NFS server (set up only in testrun.yml's Linux path), so the cross-host
  # jobs stay on scp, which works over plain ssh on every host. A representative
  # release subset is enough for a host smoke -- not the full matrix.
  testpowerpc64-hosts:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=freebsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: [""]
        arch: ["powerpc64"]
        runs: ["windows-latest", "macos-latest"]
        sync: ["scp"]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: freebsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}
