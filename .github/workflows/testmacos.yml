
name: MacOS

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/testmacos.yml'
      - '.github/workflows/testrun.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[os=') || contains(github.event.head_commit.message, format('[os={0}]', matrix.os)) }}
    strategy:
      fail-fast: false
      matrix:
        os: ["freebsd", "midnightbsd", "netbsd", "openbsd", "solaris", "dragonflybsd", "omnios", "openindiana"]
        arch: ["aarch64", "x86_64"]
        runs: ["macos-latest"]
        sync: ["scp", "rsync"]
        exclude:
          - os: solaris
            arch: aarch64
          - os: dragonflybsd
            arch: aarch64
          - os: omnios
            arch: aarch64
          - os: openindiana
            arch: aarch64
          - os: midnightbsd
            arch: aarch64


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}
      sleep: "sleep 10;"
      
      
      
      
