
name: Haiku

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/haiku.yml'
      - '.github/workflows/testrun.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Coverage tracks haiku-builder v2.0.1 (ALL_RELEASES = r1beta5), x86_64 only.
# Sync backends are rsync + scp + nfs + sshfs.
# nfs uses Haiku's in-kernel NFSv4.0 client (the nfs4 file system add-on,
# in the default image) against the bundled user-space nfsd:
# `mount -t nfs4 -p "server:/ port=N" dir`, TCP by default, port= honored
# (ParseArguments in src/add-ons/kernel/file_systems/nfs4/
# kernel_interface.cpp). Verified locally 2026-07-23 under QEMU/KVM:
# read + write-back, 4MB sha256 both directions, nonstandard port 2050.
# sshfs has no CLI on Haiku: sshfs_fuse (baked into the v2.0.2 image) is a
# userlandfs FUSE add-on mounted via `mount -t userlandfs -p "sshfs <src>"`.
# The kernel's on-demand userlandfs_server launch is broken on r1beta5
# (runtime_loader tries to load the add-ons DIRECTORY as an ELF -> mount
# fails with "Bad port ID"), so anyvm's sync_sshfs haiku branch pre-starts
# `userlandfs_server sshfs` first; with that, the mount works. Verified
# locally 2026-07-23: read + write-back, 4MB sha256 both directions.
# The guest user is "user" and the share lands under /boot/home.
#
# Both backends run on the Linux runner plus the macOS / Windows runners as a
# host-portability check. Those guests run under TCG and boot slowly, so a
# pause is inserted between the ssh probes.
jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=haiku]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["r1beta5"]
        arch: [""]
        runs: ["ubuntu-24.04"]
        sync: ["rsync", "scp", "nfs", "sshfs"]


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: haiku
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: ${{ matrix.sync }}
      user: user
      vmpath: /boot/home/host
      sleep: ${{ matrix.runs != 'ubuntu-24.04' && 'sleep 10;' || '' }}
