
name: OpenBSD

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - '*'
    paths:
      - '**.py'
      - '.github/workflows/openbsd.yml'
      - '.github/workflows/testrun.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testsshfs-old:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.3", "7.4", "7.5", "7.6"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04"]
        exclude:
          - release: 7.3
            arch: aarch64


    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "sshfs"


  testnfs-old:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.3", "7.4", "7.5", "7.6"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04"]
        exclude:
          - release: 7.3
            arch: aarch64

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "nfs"


  testsshfs:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.7", "7.8", "7.9"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04", "ubuntu-24.04-arm"]
        exclude:
          - runs: ubuntu-24.04-arm
            arch: ""

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "sshfs"

  testnfs:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.7", "7.8", "7.9"]
        arch: ["aarch64", ""]
        runs: ["ubuntu-24.04", "ubuntu-24.04-arm"]
        exclude:
          - runs: ubuntu-24.04-arm
            arch: ""

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "nfs"


  testscp-riscv64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.7", "7.8", "7.9"]
        arch: ["riscv64"]
        runs: ["ubuntu-24.04"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "scp"


  testrsync-riscv64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.7", "7.8", "7.9"]
        arch: ["riscv64"]
        runs: ["ubuntu-24.04"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "rsync"


  # sparc64 (QEMU sun4u + the patched OpenBIOS anyvm.py auto-downloads) ships
  # for 7.9. Like riscv64 it is headless (console build), so use the scp/rsync
  # sync backends rather than sshfs/nfs.
  testscp-sparc64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.9"]
        arch: ["sparc64"]
        runs: ["ubuntu-24.04"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "scp"


  testrsync-sparc64:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[testos=') || contains(github.event.head_commit.message, '[testos=openbsd]') }}
    strategy:
      fail-fast: false
      matrix:
        release: ["7.9"]
        arch: ["sparc64"]
        runs: ["ubuntu-24.04"]

    uses: ./.github/workflows/testrun.yml
    secrets: inherit
    with:
      runs: ${{ matrix.runs }}
      os: openbsd
      release: ${{ matrix.release }}
      arch: ${{ matrix.arch }}
      sync: "rsync"




